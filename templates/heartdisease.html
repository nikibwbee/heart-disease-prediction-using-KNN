<!DOCTYPE html>
<html>
<head>
    <title>Heart Disease Prediction</title>
</head>

<body>

    <h1>Heart Disease Prediction</h1>
    <form id="predictForm">

        Age: <input type="number" name="Age"><br><br>
        RestingBP: <input type="number" name="RestingBP"><br><br>
        Cholesterol: <input type="number" name="Cholesterol"><br><br>
        MaxHR: <input type="number" name="MaxHR"><br><br>
        Oldpeak: <input type="number" step="0.1" name="Oldpeak"><br><br>

        Sex_M: <input type="number" name="Sex_M"><br><br>
        ChestPainType_ATA: <input type="number" name="ChestPainType_ATA"><br><br>
        ST_Slope_Up: <input type="number" name="ST_Slope_Up"><br><br>
        ExerciseAngina_Y: <input type="number" name="ExerciseAngina_Y"><br><br>

        <button type="button" onclick="predict()">Predict</button>

    </form>

    <h2 id="result"></h2>

    <script>
        async function predict() {
        
            const form = document.getElementById("predictForm");
        
            const data = {
                Age: Number(form.Age.value),
                RestingBP: Number(form.RestingBP.value),
                Cholesterol: Number(form.Cholesterol.value),
                MaxHR: Number(form.MaxHR.value),
                Oldpeak: Number(form.Oldpeak.value),
                Sex_M: Number(form.Sex_M.value),
                ChestPainType_ATA: Number(form.ChestPainType_ATA.value),
                ST_Slope_Up: Number(form.ST_Slope_Up.value),
                ExerciseAngina_Y: Number(form.ExerciseAngina_Y.value)
            };
        
            try {
                const response = await fetch("https://heart-disease-prediction-using-knn.onrender.com/predict", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                });
        
                const result = await response.json();
        
                const output = document.getElementById("result");
        
                if (output) {
                    output.innerHTML = "Prediction: " + result.prediction;
                } else {
                    console.error("Result element not found!");
                }
        
            } catch (error) {
                console.error("Error:", error);
            }
        }
        </script>

</body>
</html>
